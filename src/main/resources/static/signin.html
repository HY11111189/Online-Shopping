<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ShopSmart | Sign in</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Archivo:wght@400;500;600;700;800&family=Space+Grotesk:wght@500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/storefront.css">
</head>
<body data-page="signin">
<div class="page-shell">
    <header class="site-header">
        <div class="header-main">
            <a class="brand-chip" href="/index.html">
                <span class="brand-burst">*</span>
                <span class="brand-copy"><strong>ShopSmart</strong><span>Account</span></span>
            </a>
            <div class="location-chip"><span class="eyebrow">Store</span><strong>Chicago, IL 60601</strong><span>Pickup available today</span></div>
            <form class="search-shell" id="global-search-form">
                <label class="sr-only" for="global-search">Search catalog</label>
                <input id="global-search" type="search" placeholder="Search and jump back to home">
                <button class="primary-button" type="submit">Search</button>
            </form>
            <div class="header-actions">
                <a class="account-action" data-auth-link="true" href="/signin.html">Sign in</a>
                <a class="account-action" data-wishlist-link="true" href="/wishlist.html">Lists</a>
                <a class="account-action cart-action" href="/cart.html">
                    <span class="cart-icon">🛒</span>
                    <span class="cart-copy">
                        <strong>Cart</strong>
                        <span id="header-cart-pill">0 items</span>
                    </span>
                </a>
            </div>
        </div>
    </header>
    <main class="page-main">
        <section class="signin-layout">
            <aside class="account-panel panel signin-card">
                <div class="section-head auth-card-head">
                    <div>
                        <p class="eyebrow">Account</p>
                        <h2>Sign in</h2>
                        <p class="auth-card-copy">Use your email or username to access your cart, orders, and saved details.</p>
                    </div>
                </div>
                <form class="stack auth-form" id="signin-form">
                    <label class="field">
                        <span>Email or username</span>
                        <input id="signin-account" type="text" autocomplete="username" placeholder="Enter email or username">
                    </label>
                    <label class="field">
                        <span>Password</span>
                        <input id="signin-password" type="password" autocomplete="current-password" placeholder="Enter password">
                    </label>
                    <div class="stack-actions">
                        <button class="primary-button" type="submit">Sign in</button>
                    </div>
                </form>
                <div class="message-box auth-message" id="signin-message">Sign in to continue.</div>
                <div class="signin-create">
                    <span>New customer?</span>
                    <a class="secondary-button" href="/signup.html">Create account</a>
                </div>
            </aside>
        </section>
    </main>
</div>
<script src="/storefront.js"></script>
</body>
</html>
