# datasource
spring.datasource.url=jdbc:mysql://192.168.5.13:3306/redbook?allowPublicKeyRetrieval=true&useSSL=false
spring.datasource.username=chuwa
spring.datasource.password=chuwa

# hibernate properties
spring.jpa.properties.hibernate.dialect = org.hibernate.dialect.MySQL5InnoDBDialect

# hibernate ddl auto (create, create-drop, validate, update)
spring.jpa.hibernate.ddl-auto=update

# acutator, JMX
management.endpoints.web.exposure.include=*

## spring security
#spring.security.user.name=chuwa
#spring.security.user.password=chuwa
#spring.security.user.roles=ADMIN

## OAuth2 Properties - Asymmetric JWT with RSA
# OAuth2 Authorization Server
spring.security.oauth2.authorizationserver.issuer=http://localhost:8080
app.oauth2.access-token-expiration-minutes=60
app.oauth2.refresh-token-expiration-days=7

# OAuth2 Client Configuration
app.oauth2.client-id=redbook-client
app.oauth2.client-secret=redbook-secret-2024

# RSA Key Storage (where to save/load private and public keys)
app.oauth2.key-store-path=src/main/resources/certificates

# CORS Configuration
app.cors.allowed-origins=*