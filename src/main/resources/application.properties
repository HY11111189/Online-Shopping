# relational database: account + payment + existing blog/security tables
spring.datasource.url=${SHOPPING_SQL_URL:jdbc:mysql://localhost:3307/online_shopping?allowPublicKeyRetrieval=true&useSSL=false&serverTimezone=America/Chicago}
spring.datasource.username=${SHOPPING_SQL_USERNAME:root}
spring.datasource.password=${SHOPPING_SQL_PASSWORD:myJava!1}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# hibernate properties
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQL5InnoDBDialect
spring.jpa.open-in-view=false

# hibernate ddl auto (create, create-drop, validate, update)
spring.jpa.hibernate.ddl-auto=update

# mongodb: item metadata + inventory
spring.data.mongodb.uri=${SHOPPING_MONGO_URI:mongodb://localhost:27017/online_shopping_item}
spring.data.mongodb.auto-index-creation=true

# cassandra: order + cart
spring.data.cassandra.contact-points=${SHOPPING_CASSANDRA_CONTACT_POINTS:127.0.0.1}
spring.data.cassandra.port=${SHOPPING_CASSANDRA_PORT:9042}
spring.data.cassandra.keyspace-name=${SHOPPING_CASSANDRA_KEYSPACE:online_shopping_order}
spring.data.cassandra.local-datacenter=${SHOPPING_CASSANDRA_DATACENTER:datacenter1}
spring.data.cassandra.schema-action=create_if_not_exists
spring.data.cassandra.request.timeout=10s

# acutator, JMX
management.endpoints.web.exposure.include=*

## spring security
#spring.security.user.name=chuwa
#spring.security.user.password=chuwa
#spring.security.user.roles=ADMIN

## OAuth2 Properties - Asymmetric JWT with RSA
# OAuth2 Authorization Server
spring.security.oauth2.authorizationserver.issuer=http://localhost:8080
app.oauth2.access-token-expiration-minutes=60
app.oauth2.refresh-token-expiration-days=7

# OAuth2 Client Configuration
app.oauth2.client-id=online-shopping-client
app.oauth2.client-secret=online-shopping-secret-2024

# RSA Key Storage (where to save/load private and public keys)
app.oauth2.key-store-path=src/main/resources/certificates

# CORS Configuration
app.cors.allowed-origins=*

# synchronous inter-service communication
shopping.services.item.base-url=${SHOPPING_ITEM_SERVICE_BASE_URL:http://localhost:8080}
shopping.services.order.base-url=${SHOPPING_ORDER_SERVICE_BASE_URL:http://localhost:8080}
