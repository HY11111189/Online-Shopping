server.port=8084
spring.application.name=payment-service

spring.datasource.url=jdbc:mysql://localhost:3307/online_shopping?allowPublicKeyRetrieval=true&useSSL=false&serverTimezone=America/Chicago
spring.datasource.username=root
spring.datasource.password=myJava!1
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQL5InnoDBDialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.open-in-view=false
spring.security.oauth2.resourceserver.jwt.jwk-set-uri=${SHOPPING_AUTH_JWK_SET_URI:http://localhost:8081/oauth2/jwks}

spring.kafka.bootstrap-servers=${SHOPPING_KAFKA_BOOTSTRAP_SERVERS:localhost:29092}
spring.kafka.consumer.group-id=payment-service
spring.kafka.consumer.auto-offset-reset=earliest
spring.kafka.consumer.enable-auto-commit=false
spring.kafka.consumer.key-deserializer=org.apache.kafka.common.serialization.StringDeserializer
spring.kafka.consumer.value-deserializer=org.springframework.kafka.support.serializer.JsonDeserializer
spring.kafka.consumer.properties.spring.json.trusted.packages=com.chuwa.shopping.dto.order,com.chuwa.shopping.dto.payment
shopping.kafka.consumer.concurrency=${SHOPPING_KAFKA_PAYMENT_CONCURRENCY:8}
shopping.kafka.consumer.max-retries=${SHOPPING_KAFKA_PAYMENT_MAX_RETRIES:5}

shopping.services.item.base-url=${SHOPPING_ITEM_SERVICE_BASE_URL:http://localhost:8082}
shopping.services.order.base-url=${SHOPPING_ORDER_SERVICE_BASE_URL:http://localhost:8083}
shopping.kafka.topic.order-placed=${SHOPPING_KAFKA_ORDER_PLACED_TOPIC:shopping.order.placed.v1}

management.endpoints.web.exposure.include=*
