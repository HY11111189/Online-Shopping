server.port=8081
spring.application.name=account-service

spring.datasource.url=jdbc:mysql://localhost:3307/online_shopping?allowPublicKeyRetrieval=true&useSSL=false&serverTimezone=America/Chicago
spring.datasource.username=root
spring.datasource.password=myJava!1
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQL5InnoDBDialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.open-in-view=false

spring.security.oauth2.authorizationserver.issuer=http://localhost:8081
app.oauth2.access-token-expiration-minutes=60
app.oauth2.refresh-token-expiration-days=7
app.oauth2.client-id=online-shopping-client
app.oauth2.client-secret=online-shopping-secret-2024
app.oauth2.key-store-path=src/main/resources/certificates
app.cors.allowed-origins=*

shopping.services.item.base-url=${SHOPPING_ITEM_SERVICE_BASE_URL:http://localhost:8082}
shopping.services.order.base-url=${SHOPPING_ORDER_SERVICE_BASE_URL:http://localhost:8083}
shopping.assistant.openai.api-key=${OPENAI_API_KEY:}
shopping.assistant.openai.model=${SHOPPING_ASSISTANT_MODEL:gpt-5.1}

management.endpoints.web.exposure.include=*
