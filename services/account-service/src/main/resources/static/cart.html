<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ShopSmart Market | Cart</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Archivo:wght@400;500;600;700;800&family=Space+Grotesk:wght@500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/storefront.css?v=20260428c">
</head>
<body data-page="cart">
<div class="page-shell">
    <header class="site-header">
        <div class="header-main">
            <a class="brand-chip" href="/index.html">
                <span class="brand-burst">*</span>
                <span class="brand-copy"><strong>ShopSmart Market</strong><span>Your cart</span></span>
            </a>
            <div class="location-chip"><span class="eyebrow">Cart</span><strong>Your saved items</strong><span>Ready for checkout</span></div>
            <form class="search-shell" id="global-search-form">
                <label class="sr-only" for="global-search">Search catalog</label>
                <input id="global-search" type="search" placeholder="Search more items">
                <button class="primary-button" type="submit">Search</button>
            </form>
            <div class="header-actions">
                <a class="account-action" data-auth-link="true" href="/signin.html">Sign in</a>
                <a class="account-action" data-wishlist-link="true" href="/wishlist.html">Lists</a>
                <a class="account-action cart-action" href="/cart.html">
                    <span class="cart-icon">🛒</span>
                    <span class="cart-copy">
                        <strong>Cart</strong>
                        <span id="header-cart-pill">0 items</span>
                    </span>
                </a>
            </div>
        </div>
    </header>
    <main class="page-main">
        <section class="layout-two">
            <article class="section-panel panel">
                <div class="section-head">
                    <div>
                        <p class="eyebrow">Cart review</p>
                        <h2>Your cart</h2>
                    </div>
                    <button class="secondary-button" type="button" id="cart-refresh-button">Reload cart</button>
                </div>
                <div class="message-box" id="cart-page-message">Your cart items appear here.</div>
                <div class="stack" id="cart-page-items"></div>
            </article>
            <aside class="side-panel panel sticky-column">
                <div class="section-head">
                    <div>
                        <p class="eyebrow">Subtotal</p>
                        <h2>Review and checkout</h2>
                    </div>
                </div>
                <div class="summary-list">
                    <div class="summary-line"><span>Items</span><strong id="cart-page-unit-count">0</strong></div>
                    <div class="summary-line total"><span>Estimated total</span><strong id="cart-page-total">$0.00</strong></div>
                </div>
                <div class="stack">
                    <button class="primary-button" type="button" id="cart-checkout-button">Continue to checkout</button>
                    <a class="secondary-button" href="/index.html">Keep shopping</a>
                </div>
            </aside>
        </section>
    </main>
</div>
<script src="/storefront.js?v=20260428c"></script>
</body>
</html>
