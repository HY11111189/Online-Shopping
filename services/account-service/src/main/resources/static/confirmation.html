<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ShopSmart Market | Order confirmation</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Archivo:wght@400;500;600;700;800&family=Space+Grotesk:wght@500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/storefront.css?v=20260428c">
</head>
<body data-page="confirmation">
<div class="page-shell">
    <header class="site-header">
        <div class="header-main">
            <a class="brand-chip" href="/index.html">
                <span class="brand-burst">*</span>
                <span class="brand-copy"><strong>ShopSmart Market</strong><span>Order placed</span></span>
            </a>
            <div class="location-chip"><span class="eyebrow">Confirmation</span><strong>Thanks for your order</strong><span>We are getting it ready</span></div>
            <form class="search-shell" id="global-search-form">
                <label class="sr-only" for="global-search">Search catalog</label>
                <input id="global-search" type="search" placeholder="Search for your next purchase">
                <button class="primary-button" type="submit">Search</button>
            </form>
            <div class="header-actions">
                <a class="account-action" data-auth-link="true" href="/signin.html">Sign in</a>
                <a class="account-action" data-wishlist-link="true" href="/wishlist.html">Lists</a>
                <a class="account-action cart-action" href="/cart.html">
                    <span class="cart-icon">🛒</span>
                    <span class="cart-copy">
                        <strong>Cart</strong>
                        <span id="header-cart-pill">0 items</span>
                    </span>
                </a>
            </div>
        </div>
    </header>
    <main class="page-main">
        <section class="confirmation-panel panel">
                <div class="section-head">
                    <div>
                        <p class="eyebrow">Order confirmation</p>
                        <h2>Your order is confirmed</h2>
                    </div>
                </div>
                <div class="status-grid">
                    <article class="status-card"><span class="eyebrow">Order number</span><strong id="confirmation-order-number">-</strong></article>
                    <article class="status-card"><span class="eyebrow">Order</span><strong id="confirmation-order-status">-</strong></article>
                    <article class="status-card"><span class="eyebrow">Payment</span><strong id="confirmation-payment-status">-</strong></article>
                    <article class="status-card"><span class="eyebrow">Total</span><strong id="confirmation-total">$0.00</strong></article>
                </div>
            <div class="message-box" id="confirmation-message" style="margin-top:18px;">Your order details appear here.</div>
            <div class="timeline" id="confirmation-timeline" style="margin-top:18px;"></div>
            <div class="order-detail-grid" id="confirmation-fulfillment-grid" style="margin-top:18px;"></div>
            <div class="stack" id="confirmation-item-groups" style="margin-top:18px;"></div>
            <div class="inline-actions" style="margin-top:18px;">
                <a class="primary-button" href="/index.html">Continue shopping</a>
                <a class="secondary-button" href="/account.html">View account</a>
            </div>
        </section>
    </main>
</div>
<script src="/storefront.js?v=20260428c"></script>
</body>
</html>
